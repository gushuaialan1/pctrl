name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/pctrl
            archive_name: pctrl-linux-x64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/pctrl
            archive_name: pctrl-macos-x64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/pctrl.exe
            archive_name: pctrl-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary with dictionaries
        shell: bash
        run: |
          mkdir -p dist/pctrl
          cp ${{ matrix.binary }} dist/pctrl/
          cp -r dictionaries dist/pctrl/
          cd dist
          if [[ "${{ matrix.archive_name }}" == *.zip ]]; then
            powershell -Command "Compress-Archive -Path pctrl\* -DestinationPath ${{ matrix.archive_name }}"
          else
            tar -czf ${{ matrix.archive_name }} pctrl
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
